[build]
  publish = "."
  command = "echo 'Static site - no build step needed'"

[dev]
  port = 8888
  publish = "."

[[redirects]]
  from = "/mn"
  to = "/mn.html"
  status = 200

[[redirects]]
  from = "/class"
  to = "/class.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/lp.html"
  status = 200

[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "*.{png,jpg,jpeg,gif,svg,webp}"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
